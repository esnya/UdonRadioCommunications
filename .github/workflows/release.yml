name: Release
on:
  push:
    branches:
      - main
      - alpha
      - "copilot/**"
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create VPM package archives and upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./Packages/com.nekometer.esnya.udon-radio-communications/package.json').version")
          TAG="v${VERSION}"
          if gh release view "${TAG}" &>/dev/null; then
            cd Packages/com.nekometer.esnya.udon-radio-communications
            zip -r "../../com.nekometer.esnya.udon-radio-communications-${VERSION}.zip" . -x "*.meta" -x "Demo.unity"
            cd ../com.nekometer.esnya.udon-radio-communications-sf
            zip -r "../../com.nekometer.esnya.udon-radio-communications-sf-${VERSION}.zip" . -x "*.meta"
            cd ../..
            gh release upload "${TAG}" \
              "com.nekometer.esnya.udon-radio-communications-${VERSION}.zip" \
              "com.nekometer.esnya.udon-radio-communications-sf-${VERSION}.zip" \
              "Packages/com.nekometer.esnya.udon-radio-communications/package.json" \
              "Packages/com.nekometer.esnya.udon-radio-communications-sf/package.json" \
              --clobber
          fi
